<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="section auth-page auth-page--register">
  <div class="container auth-register-container auth-register-container--narrow">
    <div class="auth-register-card-themed">
      <div class="auth-register-brand" aria-hidden="true">
        <span class="auth-register-brand__accent">Kid</span><span class="auth-register-brand__rest">Fashion</span>
      </div>
      <p class="auth-register-welcome">Chào mừng bạn đến với KidFashion</p>

      <div th:if="${errorMessage != null}" class="alert alert-error" th:text="${errorMessage}"></div>

      <form th:action="@{/register}" method="post" class="auth-register-form" id="registerForm" novalidate>
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="auth-fields-stack auth-fields-stack--tight">
          <label for="displayName" class="auth-visually-hidden">Tên hiển thị</label>
          <div class="auth-input-with-icon">
            <span class="auth-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            </span>
            <input type="text" name="displayName" id="displayName" required maxlength="120"
                   autocomplete="nickname" placeholder="Tên hiển thị"/>
          </div>

          <label for="email" class="auth-visually-hidden">Email</label>
          <div class="auth-input-with-icon">
            <span class="auth-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            </span>
            <input type="email" name="email" id="email" required autocomplete="email" inputmode="email" placeholder="Email"/>
          </div>

          <label for="regPassword" class="auth-visually-hidden">Mật khẩu</label>
          <div class="auth-input-with-icon auth-input-with-icon--password">
            <span class="auth-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="regPassword" name="password" required minlength="6" maxlength="128"
                   autocomplete="new-password" placeholder="Mật khẩu"/>
            <button type="button" class="pwd-toggle-btn" data-password-target="regPassword" aria-label="Hiện mật khẩu" aria-pressed="false" title="Hiện/ẩn mật khẩu">
              <svg class="pwd-toggle-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>

          <label for="regPasswordConfirm" class="auth-visually-hidden">Nhập lại mật khẩu</label>
          <div class="auth-input-with-icon auth-input-with-icon--password">
            <span class="auth-input-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            </span>
            <input type="password" id="regPasswordConfirm" name="confirmPassword" required minlength="6" maxlength="128"
                   autocomplete="new-password" placeholder="Nhập lại mật khẩu"/>
            <button type="button" class="pwd-toggle-btn" data-password-target="regPasswordConfirm" aria-label="Hiện mật khẩu" aria-pressed="false" title="Hiện/ẩn mật khẩu">
              <svg class="pwd-toggle-icon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="auth-btn-register-primary">Đăng ký ngay</button>
      </form>

      <div th:if="${!#strings.isEmpty(@environment.getProperty('spring.security.oauth2.client.registration.google.client-id'))}"
           class="auth-divider auth-divider--register"><span>Hoặc</span></div>
      <a th:if="${!#strings.isEmpty(@environment.getProperty('spring.security.oauth2.client.registration.google.client-id'))}"
         th:href="@{/oauth2/authorization/google}" class="auth-btn-google-register">
        <svg class="auth-google-g" viewBox="0 0 48 48" width="22" height="22" aria-hidden="true">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.902 11.902 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002 6.19 5.238C48.48 37.357 52 31.083 52 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
        Đăng nhập bằng Google
      </a>

      <p class="auth-register-footer">
        Bạn đã có tài khoản?
        <a th:href="@{/login}" class="auth-register-footer__link">Đăng nhập</a>
      </p>
    </div>
  </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<script>
(function () {
  var form = document.getElementById('registerForm');
  if (form) {
    form.addEventListener('submit', function (e) {
      var p = document.getElementById('regPassword');
      var c = document.getElementById('regPasswordConfirm');
      if (p && c && p.value !== c.value) {
        e.preventDefault();
        alert('Mật khẩu xác nhận không khớp. Vui lòng kiểm tra lại.');
      }
    });
  }
})();
</script>
</body>
</html>
