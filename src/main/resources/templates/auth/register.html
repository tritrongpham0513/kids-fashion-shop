<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="section">
  <div class="container">
    <div class="form-card" style="max-width:520px;margin:0 auto">
      <h2 style="margin-top:0">Đăng ký</h2>
      <div th:if="${errorMessage != null}" class="alert alert-error" th:text="${errorMessage}"></div>
      <form th:action="@{/register}" method="post" class="form-grid">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label class="field">Họ tên
          <input type="text" name="fullName" required/>
        </label>
        <label class="field">Email
          <input type="email" name="email" required autocomplete="email"/>
        </label>
        <label class="field">Mật khẩu (tối thiểu 6 ký tự)
          <input type="password" name="password" required autocomplete="new-password"/>
        </label>
        <label class="field">Điện thoại
          <input type="text" name="phone"/>
        </label>
        <label class="field">Địa chỉ
          <textarea name="address"></textarea>
        </label>
        <button type="submit" class="btn">Tạo tài khoản</button>
      </form>
      <p class="muted">Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
    </div>
  </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
