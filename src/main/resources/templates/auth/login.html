<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Đăng nhập')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="section">
  <div class="container">
    <div class="form-card" style="max-width:480px;margin:0 auto">
      <h2 style="margin-top:0">Đăng nhập</h2>
      <div th:if="${successMessage != null}" class="alert alert-success" th:text="${successMessage}"></div>
      <div th:if="${param.error}" class="alert alert-error">Tên đăng nhập hoặc mật khẩu không đúng.</div>
      <form th:action="@{/login}" method="post" class="form-grid">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label class="field">Email
          <input type="email" name="username" required autocomplete="username"/>
        </label>
        <label class="field">Mật khẩu
          <input type="password" name="password" required autocomplete="current-password"/>
        </label>
        <button type="submit" class="btn">Đăng nhập</button>
      </form>
      <p class="muted">Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></p>
      <p class="muted" style="font-size:0.9rem">Quản trị: đăng nhập bằng email admin trong file cấu hình.</p>
    </div>
  </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
