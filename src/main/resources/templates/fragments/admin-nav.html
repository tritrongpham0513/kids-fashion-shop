<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<aside th:fragment="sidebar" class="admin-sidebar"
       th:with="path=${#httpServletRequest != null ? #httpServletRequest.requestURI : ''}">
  <div class="admin-sidebar__brand">
    <span class="admin-sidebar__logo" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </span>
    <div class="admin-sidebar__brand-text">
      <span class="admin-sidebar__title">Kids Fashion</span>
      <span class="admin-sidebar__subtitle">Quản trị</span>
    </div>
  </div>
  <nav class="admin-sidebar__nav" aria-label="Menu quản trị">
    <a th:href="@{/admin}" class="admin-sidebar__link"
       th:classappend="${(#strings.endsWith(path, '/admin') or #strings.endsWith(path, '/admin/')) ? ' is-active' : ''}">
      <span class="admin-sidebar__icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      Tổng quan
    </a>
    <a th:href="@{/admin/categories}" class="admin-sidebar__link"
       th:classappend="${#strings.contains(path, '/admin/categories') ? ' is-active' : ''}">
      <span class="admin-sidebar__icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span>
      Danh mục
    </a>
    <a th:href="@{/admin/products}" class="admin-sidebar__link"
       th:classappend="${#strings.contains(path, '/admin/products') ? ' is-active' : ''}">
      <span class="admin-sidebar__icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
      Sản phẩm
    </a>
    <a th:href="@{/admin/discounts}" class="admin-sidebar__link"
       th:classappend="${#strings.contains(path, '/admin/discounts') ? ' is-active' : ''}">
      <span class="admin-sidebar__icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg></span>
      Mã giảm giá
    </a>
    <a th:href="@{/admin/customers}" class="admin-sidebar__link"
       th:classappend="${#strings.contains(path, '/admin/customers') ? ' is-active' : ''}">
      <span class="admin-sidebar__icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>
      Khách hàng
    </a>
    <a th:href="@{/admin/orders}" class="admin-sidebar__link"
       th:classappend="${#strings.contains(path, '/admin/orders') ? ' is-active' : ''}">
      <span class="admin-sidebar__icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg></span>
      Đơn hàng
    </a>
    <a th:href="@{/admin/statistics}" class="admin-sidebar__link"
       th:classappend="${#strings.contains(path, '/admin/statistics') ? ' is-active' : ''}">
      <span class="admin-sidebar__icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
      Thống kê
    </a>
  </nav>
  <div class="admin-sidebar__footer">
    <a th:href="@{/}" class="admin-sidebar__link admin-sidebar__link--muted">
      <span class="admin-sidebar__icon" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></span>
      Về cửa hàng
    </a>
  </div>
</aside>
</body>
</html>
