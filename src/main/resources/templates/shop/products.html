<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<main class="section">
  <div class="container">
    <div class="section-head">
      <h2>Tất cả sản phẩm</h2>
      <span class="muted">Khám phá toàn bộ bộ sưu tập dành cho bé</span>
    </div>
    
    <div class="grid-products" th:if="${not #lists.isEmpty(products)}">
      <article class="card-product" th:each="p : ${products}">
        <div class="card-product-img-wrap">
          <a th:href="@{/products/{id}(id=${p.id})}" style="display:block; width:100%; height:100%;">
            <img th:src="${p.imageUrl}" th:alt="${p.name}"/>
          </a>
          <div class="card-actions">
            <form th:action="@{/cart/add}" method="post" style="width:100%">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <input type="hidden" name="productId" th:value="${p.id}"/>
              <input type="hidden" name="quantity" value="1"/>
              <button type="submit" class="btn">Thêm vào giỏ</button>
            </form>
          </div>
        </div>
        <div class="card-body">
          <a th:href="@{/products/{id}(id=${p.id})}"><strong th:text="${p.name}">Tên</strong></a>
          <div class="price"
               th:text="${#numbers.formatDecimal(p.price, 0, 'POINT', 0, 'COMMA')} + ' đ'">0 đ</div>
          <div class="sold-count-mini" th:if="${p.soldCount != null && p.soldCount > 0}" 
               th:text="'Đã bán ' + ${p.soldCount}" 
               style="font-size: 0.75rem; color: var(--muted); margin-top: 4px;">Đã bán 0</div>
        </div>
      </article>
    </div>
    
    <p class="muted" th:if="${#lists.isEmpty(products)}">Không có sản phẩm nào.</p>

    <!-- Pagination -->
    <div class="pagination" th:if="${totalPages != null and totalPages > 1}">
      <a th:href="@{${requestUrl}(page=${currentPage - 1})}" th:if="${currentPage > 1}">&laquo; Trước</a>
      <a th:href="@{${requestUrl}(page=${i})}" th:each="i : ${#numbers.sequence(1, totalPages)}" th:text="${i}" th:classappend="${currentPage == i ? 'active' : ''}"></a>
      <a th:href="@{${requestUrl}(page=${currentPage + 1})}" th:if="${currentPage < totalPages}">Sau &raquo;</a>
    </div>
  </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
