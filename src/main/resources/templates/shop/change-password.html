<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="section account-page">
  <div class="container">
    <div class="section-head account-page-head">
      <div>
        <p class="account-page-eyebrow">Tài khoản</p>
        <h2>Đổi mật khẩu</h2>
      </div>
      <div class="account-page-actions">
        <a class="btn btn-ghost btn-sm" th:href="@{/account/profile}">Thông tin tài khoản</a>
      </div>
    </div>

    <div th:if="${passwordSuccess != null}" class="alert alert-success" th:text="${passwordSuccess}">OK</div>
    <div th:if="${passwordError != null}" class="alert alert-error" th:text="${passwordError}">Lỗi</div>

    <div class="form-card account-profile-card">
      <h3 style="border-bottom: 1px solid #f0f0f0; padding-bottom: 16px; margin-bottom: 48px;">Đổi mật khẩu bảo mật</h3>
      
      <form th:action="@{/account/change-password}" method="post" class="form-grid" style="display: block;">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="boutique-field">
          <span class="field-label">Email tài khoản</span>
          <div class="boutique-input-wrap">
            <div class="prefix-circle">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </div>
            <input type="email" th:value="${user.email}" readonly disabled class="input-readonly" style="opacity: 0.5;"/>
          </div>
          <span class="field-hint" style="font-size: 0.7rem; color: #888; margin-top: 8px; display: block; letter-spacing: 0.02em;">Email dùng để đăng nhập và không thể thay đổi.</span>
        </div>

        <div class="boutique-field">
          <span class="field-label">Mật khẩu hiện tại</span>
          <div class="boutique-input-wrap">
            <div class="prefix-circle">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            </div>
            <input type="password" id="currentPassword" name="currentPassword" autocomplete="current-password" placeholder="Nhập mật khẩu đang dùng" required/>
            <button type="button" class="password-toggle" onclick="togglePassword('currentPassword', this)" title="Hiện/ẩn mật khẩu" style="position: static; margin-left: -40px; padding: 0 10px; z-index: 10;">
              <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <div class="boutique-field">
          <span class="field-label">Mật khẩu mới</span>
          <div class="boutique-input-wrap">
            <div class="prefix-circle">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" minlength="6" placeholder="Tối thiểu 6 ký tự" required/>
            <button type="button" class="password-toggle" onclick="togglePassword('newPassword', this)" title="Hiện/ẩn mật khẩu" style="position: static; margin-left: -40px; padding: 0 10px; z-index: 10;">
              <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <div class="boutique-field">
          <span class="field-label">Xác nhận mật khẩu mới</span>
          <div class="boutique-input-wrap">
            <div class="prefix-circle">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
            <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" minlength="6" placeholder="Nhập lại mật khẩu mới" required/>
            <button type="button" class="password-toggle" onclick="togglePassword('confirmPassword', this)" title="Hiện/ẩn mật khẩu" style="position: static; margin-left: -40px; padding: 0 10px; z-index: 10;">
              <svg class="eye-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
        </div>

        <button type="submit" class="luxury-submit-btn">Cập nhật mật khẩu ngay</button>
      </form>
    </div>
  </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
  function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon = btn.querySelector('svg');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
    }
  }
</script>
</body>
</html>
