<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="section account-page account-page--account">
  <div class="container">
    <div class="section-head account-page-head">
      <div>
        <p class="account-page-eyebrow">Tài khoản</p>
        <h2>Thông tin tài khoản</h2>
      </div>
      <div class="account-page-actions">
        <a sec:authorize="hasRole('CUSTOMER')" class="btn btn-ghost btn-sm" th:href="@{/account/orders}">Đơn hàng của tôi</a>
        <a sec:authorize="hasRole('ADMIN')" class="btn btn-ghost btn-sm" th:href="@{/admin}">Trang quản trị</a>
      </div>
    </div>

    <div th:if="${profileSuccess}" class="alert alert-success">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
      <span th:text="${profileSuccess}">Cập nhật thành công</span>
    </div>
    <div th:if="${profileError}" class="alert alert-error">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      <span th:text="${profileError}">Lỗi cập nhật</span>
    </div>

    <div class="form-card account-profile-card">
      <h3>Thông tin định danh</h3>
      
      <form th:action="@{/account/profile}" method="post" class="form-grid form-stack-block">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

        <div class="boutique-field">
          <span class="field-label">Email tài khoản</span>
          <div class="boutique-input-wrap">
            <div class="prefix-circle">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
            </div>
            <input type="email" th:value="${user.email}" readonly disabled class="input-readonly input-readonly--dim"/>
          </div>
          <span class="field-hint field-hint--subtle">Email dùng để đăng nhập và không thể thay đổi.</span>
        </div>

        <div class="boutique-field">
          <span class="field-label">Họ và tên khách hàng</span>
          <div class="boutique-input-wrap">
            <div class="prefix-circle">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            </div>
            <input type="text" name="fullName" required maxlength="200" th:value="${user.fullName}" placeholder="Nhập đầy đủ tên của bạn"/>
          </div>
        </div>

        <div class="boutique-field">
          <span class="field-label">Số điện thoại liên hệ</span>
          <div class="boutique-input-wrap">
            <div class="prefix-circle">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            </div>
            <input type="text" name="phone" maxlength="40" th:value="${user.phone}" placeholder="Ví dụ: 0901 234 567"/>
          </div>
        </div>

        <div class="boutique-field">
          <span class="field-label">Địa chỉ nhận hàng mặc định</span>
          <div class="boutique-input-wrap">
            <div class="prefix-circle">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            </div>
            <textarea name="address" rows="3" maxlength="400" placeholder="Số nhà, tên đường, khu vực..." th:text="${user.address}"></textarea>
          </div>
        </div>

        <button type="submit" class="luxury-submit-btn">Cập nhật hồ sơ</button>
      </form>
    </div>
  </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
