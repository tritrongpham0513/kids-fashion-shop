<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container admin-shell">
  <aside th:replace="~{fragments/admin-nav :: sidebar}"></aside>
  <section>
    <div class="section-head">
      <h1 style="margin:0">Sản phẩm</h1>
      <a class="btn btn-sm" th:href="@{/admin/products/new}">Thêm</a>
    </div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
        <tr><th>Tên</th><th>Danh mục</th><th>Giá</th><th>Tồn</th><th>Mới</th><th>HOT (admin)</th><th>Nổi bật</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="p : ${products}">
          <td th:text="${p.name}">Tên</td>
          <td th:text="${p.category != null} ? ${p.category.name} : ''">DM</td>
          <td th:text="${#numbers.formatDecimal(p.price, 0, 'POINT', 0, 'COMMA')}">0</td>
          <td th:text="${p.stockQuantity}">0</td>
          <td th:text="${p.newArrival} ? 'Có' : 'Không'">C</td>
          <td th:text="${p.adminHot} ? 'Có' : 'Không'">C</td>
          <td th:text="${p.bestSeller} ? 'Có' : 'Không'">C</td>
          <td class="pill-row">
            <a class="btn btn-sm btn-ghost" th:href="@{'/admin/products/' + ${p.id} + '/edit'}">Sửa</a>
            <form th:action="@{'/admin/products/' + ${p.id} + '/delete'}" method="post" style="display:inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Xóa sản phẩm?');">Xóa</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
