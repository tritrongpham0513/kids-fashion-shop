<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container admin-shell">
  <aside th:replace="~{fragments/admin-nav :: sidebar}"></aside>
  <section class="admin-main-panel">
    <header class="admin-page-header">
      <div>
        <p class="admin-page-eyebrow">Bảng điều khiển</p>
        <h1 class="admin-page-title">Xin chào</h1>
        <p class="admin-page-lead muted">Tổng quan cửa hàng thời trang trẻ em — sản phẩm, đơn hàng và khách hàng.</p>
      </div>
    </header>

    <div class="admin-stat-grid">
      <article class="admin-stat-card admin-stat-card--rose">
        <div class="admin-stat-card__icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        </div>
        <p class="admin-stat-card__label">Sản phẩm</p>
        <p class="admin-stat-card__value" th:text="${countProducts}">0</p>
      </article>
      <article class="admin-stat-card admin-stat-card--mint">
        <div class="admin-stat-card__icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
        </div>
        <p class="admin-stat-card__label">Đơn hàng</p>
        <p class="admin-stat-card__value" th:text="${countOrders}">0</p>
      </article>
      <article class="admin-stat-card admin-stat-card--sun">
        <div class="admin-stat-card__icon" aria-hidden="true">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        </div>
        <p class="admin-stat-card__label">Khách hàng</p>
        <p class="admin-stat-card__value" th:text="${countCustomers}">0</p>
      </article>
    </div>

    <h2 class="admin-section-title">Thao tác nhanh</h2>
    <div class="admin-quick-grid">
      <a th:href="@{/admin/products}" class="admin-quick-card">
        <span class="admin-quick-card__title">Quản lý sản phẩm</span>
        <span class="admin-quick-card__hint muted">Thêm, sửa, tồn kho</span>
      </a>
      <a th:href="@{/admin/orders}" class="admin-quick-card">
        <span class="admin-quick-card__title">Đơn hàng</span>
        <span class="admin-quick-card__hint muted">Trạng thái &amp; chi tiết</span>
      </a>
      <a th:href="@{/admin/statistics}" class="admin-quick-card">
        <span class="admin-quick-card__title">Thống kê</span>
        <span class="admin-quick-card__hint muted">Báo cáo doanh thu</span>
      </a>
      <a th:href="@{/admin/categories}" class="admin-quick-card">
        <span class="admin-quick-card__title">Danh mục</span>
        <span class="admin-quick-card__hint muted">Cấu trúc cửa hàng</span>
      </a>
    </div>
  </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
