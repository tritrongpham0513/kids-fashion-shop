<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container admin-shell">
  <aside th:replace="~{fragments/admin-nav :: sidebar}"></aside>
  <section>
    <h1 style="margin-top:0">Khách hàng</h1>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
        <tr><th>Họ tên</th><th>Email</th><th>Điện thoại</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="u : ${customers}">
          <td th:text="${u.fullName}">Tên</td>
          <td th:text="${u.email}">mail</td>
          <td th:text="${u.phone}">sdt</td>
          <td class="pill-row">
            <a class="btn btn-sm btn-ghost" th:href="@{'/admin/customers/' + ${u.id} + '/edit'}">Sửa</a>
            <form th:action="@{'/admin/customers/' + ${u.id} + '/delete'}" method="post" style="display:inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Xóa khách hàng?');">Xóa</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
