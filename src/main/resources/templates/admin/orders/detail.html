<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container admin-shell">
  <aside th:replace="~{fragments/admin-nav :: sidebar}"></aside>
  <section>
    <div class="section-head">
      <h1 style="margin:0" th:text="${'Đơn #' + order.id}">Đơn</h1>
      <a class="btn btn-ghost btn-sm" th:href="@{/admin/orders}">Trở lại</a>
    </div>
    <div class="form-card" style="max-width:900px">
      <p><strong>Khách:</strong> <span th:text="${order.customer.fullName}"></span> —
        <span th:text="${order.customer.email}"></span></p>
      <p><strong>Ngày:</strong> <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span></p>
      <p><strong>Địa chỉ giao hàng:</strong> <span th:text="${order.shippingAddress}"></span></p>
      <form th:action="@{'/admin/orders/' + ${order.id} + '/status'}" method="post" class="pill-row" style="align-items:center;margin:12px 0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <label class="field" style="margin:0">Cập nhật trạng thái
          <select name="status">
            <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.displayName}"
                    th:selected="${s == order.status}"></option>
          </select>
        </label>
        <button type="submit" class="btn btn-sm">Lưu</button>
      </form>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
          <tr><th>Sản phẩm</th><th>SL</th><th>Đơn giá</th><th>Tạm tính</th></tr>
          </thead>
          <tbody>
          <tr th:each="line : ${order.lines}">
            <td>
              <div th:text="${line.product.name}">Tên</div>
              <div th:if="${(line.colorLabel != null and !#strings.isEmpty(line.colorLabel)) or (line.sizeLabel != null and !#strings.isEmpty(line.sizeLabel))}"
                   style="font-size:0.85rem;color:var(--muted);margin-top:4px;">
                <span th:if="${line.colorLabel != null and !#strings.isEmpty(line.colorLabel)}">Màu: <span th:text="${line.colorLabel}"></span></span>
                <span th:if="${line.colorLabel != null and !#strings.isEmpty(line.colorLabel) and line.sizeLabel != null and !#strings.isEmpty(line.sizeLabel)}"> · </span>
                <span th:if="${line.sizeLabel != null and !#strings.isEmpty(line.sizeLabel)}">Size: <span th:text="${line.sizeLabel}"></span></span>
              </div>
            </td>
            <td th:text="${line.quantity}">1</td>
            <td th:text="${#numbers.formatDecimal(line.unitPrice, 0, 'POINT', 0, 'COMMA')} + ' đ'">0</td>
            <td th:text="${#numbers.formatDecimal(line.lineTotal, 0, 'POINT', 0, 'COMMA')} + ' đ'">0</td>
          </tr>
          </tbody>
        </table>
      </div>
      <p><strong>Tạm tính:</strong> <span th:text="${#numbers.formatDecimal(order.subtotal, 0, 'POINT', 0, 'COMMA')} + ' đ'"></span></p>
      <p><strong>Giảm giá:</strong> <span th:text="${#numbers.formatDecimal(order.discountAmount, 0, 'POINT', 0, 'COMMA')} + ' đ'"></span></p>
      <p><strong>Thành tiền:</strong> <span th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'POINT', 0, 'COMMA')} + ' đ'"></span></p>
    </div>
  </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
