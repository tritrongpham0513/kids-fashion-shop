<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container admin-shell">
  <aside th:replace="~{fragments/admin-nav :: sidebar}"></aside>
  <section>
    <div class="section-head">
      <h1 style="margin:0" th:text="${'Đơn #' + order.id}">Đơn</h1>
      <a class="btn btn-ghost btn-sm" th:href="@{/admin/orders}">Trở lại</a>
    </div>
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}"></div>

    <div class="form-card" style="max-width:900px">
      <p><strong>Khách:</strong> <span th:text="${order.customer.fullName}"></span> — 
        <span th:text="${order.customer.email}"></span></p>
      <p><strong>Ngày:</strong> <span th:text="${#temporals.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span></p>
      <p><strong>Địa chỉ giao hàng:</strong> <span th:text="${order.shippingAddress}"></span></p>
      
      <div class="table-wrap">
        <table class="data-table">
          <thead>
          <tr>
            <th>Sản phẩm</th>
            <th>Màu</th>
            <th>Size</th>
            <th>SL</th>
            <th>Đơn giá</th>
            <th>Tạm tính</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="line : ${order.lines}">
            <td th:text="${line.product.name}">Tên</td>
            <td th:text="${(line.colorLabel != null and !#strings.isEmpty(line.colorLabel)) ? line.colorLabel : '-'}">Màu</td>
            <td th:text="${(line.sizeLabel != null and !#strings.isEmpty(line.sizeLabel)) ? line.sizeLabel : '-'}">Size</td>
            <td th:text="${line.quantity}">1</td>
            <td th:text="${#numbers.formatDecimal(line.unitPrice, 0, 'POINT', 0, 'COMMA')} + ' đ'">0</td>
            <td th:text="${#numbers.formatDecimal(line.lineTotal, 0, 'POINT', 0, 'COMMA')} + ' đ'">0</td>
          </tr>
          </tbody>
        </table>
      </div>
      
      <div style="margin-top:20px; text-align: right; border-top: 1px solid var(--border); padding-top: 20px;">
        <p><strong>Tạm tính:</strong> <span th:text="${#numbers.formatDecimal(order.subtotal, 0, 'POINT', 0, 'COMMA')} + ' đ'"></span></p>
        <p><strong>Giảm giá:</strong> <span th:text="${#numbers.formatDecimal(order.discountAmount, 0, 'POINT', 0, 'COMMA')} + ' đ'"></span></p>
        <p style="font-size: 1.25rem; color: var(--accent); margin: 8px 0;"><strong>Thành tiền:</strong> <span th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'POINT', 0, 'COMMA')} + ' đ'"></span></p>
      </div>

      <div style="display: flex; justify-content: flex-end; margin-top: 32px;">
        <form th:action="@{'/admin/orders/' + ${order.id} + '/status'}" method="post" 
              class="pill-row" style="background: var(--bg-secondary); padding: 20px 32px; border-radius: 24px; align-items: center; gap: 20px;">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          
          <div style="display: flex; align-items: center; gap: 12px;">
            <span style="font-weight: 800; font-size: 0.8rem; letter-spacing: 0.05em; color: var(--muted); text-transform: uppercase;">Trạng thái:</span>
            <select name="status" style="border-radius: 12px; padding: 12px 40px 12px 16px; border: 1.5px solid var(--border); background: var(--bg); font-family: var(--font); font-weight: 600; cursor: pointer;">
              <option th:each="s : ${statuses}" th:value="${s.name()}" th:text="${s.displayName}"
                      th:selected="${s == order.status}"></option>
            </select>
          </div>
          
          <button type="submit" class="btn btn-primary" style="height: 48px; min-width: 160px;">Lưu trạng thái</button>
        </form>
      </div>
    </div>
  </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const alerts = document.querySelectorAll('.alert');
      alerts.forEach(alert => {
        setTimeout(() => {
          alert.classList.add('fade-out');
          setTimeout(() => alert.remove(), 400);
        }, 3000);
      });
    });
  </script>
</body>
</html>
