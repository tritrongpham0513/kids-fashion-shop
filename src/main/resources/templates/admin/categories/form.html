<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container admin-shell">
  <aside th:replace="~{fragments/admin-nav :: sidebar}"></aside>
  <section>
    <h1 style="margin-top:0" th:text="${pageTitle}">Biểu mẫu</h1>
    <form th:action="@{/admin/categories/save}" th:object="${category}" method="post" class="form-card form-grid">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
      <input type="hidden" th:field="*{id}"/>
      <p style="margin:0 0 1rem; font-size:0.9rem; color:#666;">Tên danh mục hiển thị trên menu <strong>Danh mục</strong> và thanh danh mục nhanh dưới header (sắp xếp theo tên).</p>
      <label class="field">Tên danh mục
        <input type="text" th:field="*{name}" required/>
        <span class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
      </label>
      <label class="field">Mô tả
        <textarea th:field="*{description}"></textarea>
      </label>
      <div class="form-actions">
        <a class="btn btn-ghost" th:href="@{/admin/categories}">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Quay lại
        </a>
        <button type="submit" class="btn btn-success">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
          Lưu danh mục
        </button>
      </div>
    </form>
  </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
