<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title=${pageTitle})}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>
<main class="container admin-shell">
  <aside th:replace="~{fragments/admin-nav :: sidebar}"></aside>
  <section>
    <div class="section-head">
      <h1 style="margin:0">Danh mục</h1>
      <a class="btn btn-sm" th:href="@{/admin/categories/new}">Thêm</a>
    </div>
    <p th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}">Đã lưu</p>
    <p th:if="${errorMessage}" class="alert alert-error" th:text="${errorMessage}">Lỗi</p>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
        <tr><th>Tên</th><th>Mô tả</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="c : ${categories}">
          <td th:text="${c.name}">Tên</td>
          <td th:text="${c.description}">Mô tả</td>
          <td class="pill-row">
            <a class="btn btn-sm btn-ghost" th:href="@{'/admin/categories/' + ${c.id} + '/edit'}">Sửa</a>
            <form th:action="@{'/admin/categories/' + ${c.id} + '/delete'}" method="post" style="display:inline">
              <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
              <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Xóa danh mục này?');">Xóa</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
