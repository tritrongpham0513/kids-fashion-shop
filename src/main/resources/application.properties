spring.application.name=kids-fashion-shop

# --- MySQL (dữ liệu thật: admin thêm danh mục -> lưu bảng categories, shop đọc lại bằng JPA) ---
# Ghi đè bằng biến môi trường MYSQL_USER / MYSQL_PASSWORD nếu cần (không commit mật khẩu thật lên git)
spring.datasource.url=jdbc:mysql://localhost:3306/kids_fashion_shop?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8&useUnicode=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:YOUR_DATABASE_PASSWORD}

# SePay Config
sepay.bank.acc=${SEPAY_BANK_ACC:YOUR_BANK_ACC}
sepay.bank.code=${SEPAY_BANK_CODE:YOUR_BANK_CODE}
sepay.api.key=${SEPAY_API_KEY:YOUR_SEPAY_API_KEY}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

spring.thymeleaf.cache=false

# Tính lại điểm HOT (lượt mua + đánh giá) mỗi N ms — đồng bộ sau đặt hàng / đánh giá
app.hot-score.recalc-ms=300000

# Tài khoản admin mặc định (đổi mật khẩu sau khi deploy)
app.admin.email=admin@kidfashion.local
app.admin.password=${ADMIN_PASSWORD}
app.admin.full-name=Quản trị viên

# Logging cho debug rendering
logging.level.org.springframework.web=INFO
logging.level.org.thymeleaf=INFO

# Ghi log vào file trong project để dễ debug
logging.file.name=

# Google OAuth2 login (đăng nhập Gmail)
# KHÔNG lưu secret vào file này.
# Cách 1: dùng biến môi trường GOOGLE_CLIENT_ID / GOOGLE_CLIENT_SECRET
# spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
# spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
# spring.security.oauth2.client.registration.google.scope=openid,profile,email
# Cách 2: tạo file local `secrets/google-oauth.properties` (đã gitignore) theo mẫu `.example`
spring.config.import=optional:file:./secrets/google-oauth.properties
server.port=8081