### Production-safe config for Render (no secrets in repo)
# Activate with SPRING_PROFILES_ACTIVE=render

# Disable local secret imports on Render
spring.config.import=

# Render uses $PORT
server.port=${PORT:8080}

### Database (set env vars on Render)
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

### JPA / Hibernate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Keep DDL auto update if you want; alternatively set to "validate"
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}

### OAuth2 Google (set env vars on Render)
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

### Admin defaults (set env var on Render)
app.admin.password=${ADMIN_PASSWORD}

### Logging: avoid DEBUG in production
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.web=INFO
logging.level.org.thymeleaf=INFO
logging.level.org.hibernate=INFO

# Tránh ghi log ra file ở production (có thể chứa thông tin nhạy cảm)
logging.file.name=
logging.file.path=

