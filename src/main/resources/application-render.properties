### Production-safe config for Render (no secrets in repo)
# Activate with SPRING_PROFILES_ACTIVE=render

# Disable local secret imports on Render
spring.config.import=

# Render uses $PORT
server.port=${PORT:8080}

### --- MySQL Render (Dùng biến môi trường MYSQL_URL) ---
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# --- SePay Render ---
app.sepay.bank-id=${SEPAY_BANK_ID:MBBank}
app.sepay.account-number=${SEPAY_ACC_NUMBER}
app.sepay.account-name=${SEPAY_ACC_NAME}
app.sepay.webhook-token=${SEPAY_WEBHOOK_TOKEN}

# Multipart Config
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Admin Render
app.admin.email=${ADMIN_EMAIL}
app.admin.password=${ADMIN_PASSWORD}

# Google OAuth2 Render
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,profile,email

### Logging: avoid DEBUG in production
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.web=INFO
logging.level.org.thymeleaf=INFO
logging.level.org.hibernate=INFO

# Tránh ghi log ra file ở production (có thể chứa thông tin nhạy cảm)
logging.file.name=
logging.file.path=

